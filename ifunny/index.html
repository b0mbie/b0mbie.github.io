<!DOCTYPE HTML>
<html>
<head>
    <meta property="og:title" content="iFunny Captions Generator" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://akabomb-prog.github.io/ifunny/" />
    <!--<meta property="og:image" content="https://akabomb-prog.github.io/new-jersey/splunksbob.jpg" />-->
    <meta property="og:description" content="i can't bear with esmBot responding like an hour later and i can't be bothered to set up the python captions recreation (i tried twice and it failed for some reason), so i made my own (albeit somewhat primitive) generator" />
    <meta name="theme-color" content="#00DEE5">
    <link rel="stylesheet" href="style.css">
    <title>iFunny captions</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js" integrity="sha512-nNOFtIS+H0lwgdUDaPn/g1ssw3uN9AkEM7zy2wLaTQeLQNeNiitUcLpEpDIh3Z4T22MdeTNru/SQbNM4ig2rng==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="../common/values.js"></script>
    <script src="../common/textwrap.js"></script>
    <script src="ifunny.js"></script>
</head>
<body onload="init();">
    <h1 style="font-family: LimerickCdSerial-Xbold;">the funnies</h1>
    <hr />
    <img style="display: none;" id="memeImage">
    <span><input type="file" accept="image/*" id="file" onchange="loadImage(event)"></span>
    <br />
    <span>Caption text:</span>
    <textarea id="captionText" onchange="updateParams();"></textarea>
    <br />
    <span>Text size (multiplier of overall size in %): <input type="number" min="0" max="100" value="10" id="textSize" onchange="updateParams();"></span>
    <br />
    <button onclick="downloadImage();">Download this</button>
    <hr />
    <canvas style="border: 1px solid;" id="imgCanvas" width="500" height="300">
</body>
</html>

<!DOCTYPE HTML>
<html>
<head>
    <title>Le Fishe au chocolat</title>
    <link rel="stylesheet" href="../common/style.css">
    <meta property="og:title" content="New Jersey" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://akabomb-prog.github.io/le-fishe-au-chocolat/" />
    <meta property="og:image" content="https://akabomb-prog.github.io/le-fishe-au-chocolat/fsish.png" />
    <meta property="og:description" content="Le Fishe au chocolat" />
    <meta name="theme-color" content="#42261B">
    <link rel="stylesheet" href="style.css">
    <style>
        a {
            color: white;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            text-decoration: none;
        }
        a:hover {
            color: white;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            text-decoration: underline;
        }
        #ctn {
            width: 640px;
            height: 360px;
        }
        #fishe {
            position: absolute;
            top: 85%; left: 50%;

            width: 100%;
            object-fit: contain;

            border-radius: 16px;
            
            transform: translate(-50%, -100%);
        }
        #caption {
            position: relative;
            top: -30%; left: 50%;

            font-family:'VI My Ha';
            font-size: 86px;
            letter-spacing: 2px;
            white-space: nowrap;

            display: inline-block;

            transform-origin: 50% 0;
            transform: translate(-50%, 0) scaleX(1);
        }
    </style>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="./fishe.js"></script>
</head>
<body onload="init();" onresize="stretchText();">
    <div id="ctn" class="centered">
        <i><p id="caption">Le Fishe au chocolat</p></i>
        <img src="fishe.png" id="fishe" class="nonselectable">
    </div>
    <a id="startbtn" class="centered" style="font-size:72px;text-align:center;white-space:nowrap;" href="#">le click for le funny</a>
</body>
</html>
